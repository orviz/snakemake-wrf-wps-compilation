executor: slurm

# Snakemake Slurm plugin v9
slurm:
  extra: "--export=NONE --export=HOME,USER,PATH"

precommand: "source config/profiles/altamira/set-env.sh"

default-resources:
  slurm_partition: "wncompute_ifca"
  account: "computacion"
  runtime: 60
  mem_mb: 32000


# Snakemake orchestrator pacing parameters
jobs: 100                       # Maximum number of parallel jobs to submit to Slurm
# restart-times: 1                # Auto-retry failed cluster jobs once (e.g., node eviction)
# max-jobs-per-second: 2          # Prevents throttling the Slurm controller API
# max-status-checks-per-second: 10
